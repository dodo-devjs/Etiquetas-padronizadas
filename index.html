<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Viva Art - Sistema de Etiquetas</title>

<style>

:root{
--rosa:#d94f9d;
--verde:#19c2b3;
--fundo:#f4f6f8;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:var(--fundo);
margin:0;
text-align:center;
}

header{
background:white;
padding:20px;
border-bottom:4px solid var(--rosa);
}

header h1{
margin:0;
color:var(--rosa);
}

header span{
color:var(--verde);
letter-spacing:3px;
}

.container{
padding:20px;
}

input,select{
padding:10px;
margin:5px;
border-radius:6px;
border:2px solid var(--rosa);
}

button{
padding:10px 16px;
margin:5px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.btn-add{
background:var(--rosa);
color:white;
}

.btn-print{
background:var(--verde);
color:white;
}

#folha{
width:21cm;
min-height:29.7cm;
margin:20px auto;
display:flex;
flex-wrap:wrap;
align-content:flex-start;
background:white;
padding:10px;
gap:4px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* ETIQUETA */

.etiqueta{
position:relative;
border:1px solid black;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 6px;
}

/* TAMANHO 1 */

.tamanho1{
width:10.5cm;
height:1.46cm;
}

.tamanho1 .nome{
font-size:13px;
}

.tamanho1 .valor{
font-size:20px;
font-weight:bold;
}

/* TAMANHO 2 */

.tamanho2{
width:20cm;
height:9.15cm;
flex-direction:column;
justify-content:center;
}

.tamanho2 .nome{
font-size:40px;
}

.tamanho2 .valor{
font-size:60px;
font-weight:bold;
}

/* BOTÕES */

.acoes{
position:absolute;
bottom:-18px;
right:2px;
}

.acoes button{
font-size:11px;
padding:2px 6px;
}

/* IMPRESSÃO */

@media print{

body *{
visibility:hidden;
}

#folha, #folha *{
visibility:visible;
}

#folha{
position:absolute;
top:0;
left:0;
box-shadow:none;
}

.acoes{
display:none;
}

}

</style>
</head>

<body>

<header>
<h1>Viva Art</h1>
<span>ARMARINHOS</span>
</header>

<div class="container">

<input id="nome" placeholder="Nome do produto">

<input id="valor" type="number" placeholder="Valor">

<input id="quantidade" type="number" value="1" min="1">

<select id="tamanho">
<option value="tamanho1">Etiqueta pequena</option>
<option value="tamanho2">Etiqueta promocional</option>
</select>

<br>

<button class="btn-add" onclick="adicionarEtiqueta()">Adicionar</button>

<button class="btn-print" onclick="window.print()">Imprimir</button>

</div>

<div id="folha"></div>

<script>

function adicionarEtiqueta(){

const nome=document.getElementById("nome").value
const valor=document.getElementById("valor").value
const quantidade=parseInt(document.getElementById("quantidade").value)
const tamanho=document.getElementById("tamanho").value

if(!nome || !valor){

alert("Preencha nome e valor")

return

}

const folha=document.getElementById("folha")

for(let i=0;i<quantidade;i++){

const etiqueta=document.createElement("div")

etiqueta.className=`etiqueta ${tamanho}`

etiqueta.innerHTML=`

<span class="nome">${nome}</span>

<span class="valor">R$ ${parseFloat(valor).toFixed(2)}</span>

<div class="acoes">

<button onclick="editarEtiqueta(this)">Editar</button>

<button onclick="excluirEtiqueta(this)">Excluir</button>

</div>

`

folha.appendChild(etiqueta)

}

document.getElementById("nome").value=""
document.getElementById("valor").value=""
document.getElementById("quantidade").value=1

}

/* EXCLUIR */

function excluirEtiqueta(botao){

const etiqueta=botao.parentElement.parentElement

etiqueta.remove()

}

/* EDITAR */

function editarEtiqueta(botao){

const etiqueta=botao.parentElement.parentElement

const nome=etiqueta.querySelector(".nome").innerText

const valor=etiqueta.querySelector(".valor").innerText.replace("R$ ","")

document.getElementById("nome").value=nome

document.getElementById("valor").value=valor

etiqueta.remove()

}

</script>

</body>
</html>
