<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Viva Art - Sistema de Etiquetas</title>

<style>

@page{
size:A4;
margin:0;
}

@media print{

body{
margin:0;
padding:0;
}

#folha{
margin:0;
}

}

:root{
--rosa:#d94f9d;
--verde:#19c2b3;
--fundo:#f4f6f8;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:var(--fundo);
margin:0;
text-align:center;
}

header{
background:white;
padding:20px;
border-bottom:4px solid var(--rosa);
}

header h1{
margin:0;
color:var(--rosa);
}

header span{
color:var(--verde);
letter-spacing:3px;
}

.container{
padding:20px;
}

input,select{
padding:10px;
margin:5px;
border-radius:6px;
border:2px solid var(--rosa);
}

button{
padding:10px 16px;
margin:5px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.btn-add{
background:var(--rosa);
color:white;
}

.btn-print{
background:var(--verde);
color:white;
}

/* FOLHA A4 */

#folha{
width:210mm;
height:297mm;
margin:20px auto;

display:grid;
grid-template-columns: 1fr 1fr;

align-content:start;

background:white;

padding:10px;

row-gap:2px;
column-gap:4px;
}

/* ETIQUETA BASE */

.etiqueta{
border:1px solid black;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 4px;
cursor:default;
}

/* ETIQUETA PEQUENA */

.tamanho1{
width:100%;
height:1.5cm;

display:flex;
align-items:center;
justify-content:space-between;

box-sizing:border-box;

padding:0 6px;

border:1px solid black;
}

.tamanho1 .nome{
font-size:20px;
font-weight:bold;

white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.tamanho1 .valor{
font-size:26px;
font-weight:bold;
}

/* ETIQUETA PROMOCIONAL */

.tamanho2{
width:20cm;
height:9.15cm;
flex-direction:column;
justify-content:center;
}

.tamanho2 .nome{
font-size:40px;
font-weight:bold;
}

.tamanho2 .valor{
font-size:60px;
font-weight:bold;
}

/* BOTÕES */

.btn-editar,
.btn-excluir{
background:var(--verde);
color:white;
font-size:10px;
padding:2px 4px;
line-height:1;
}

.btn-duplicar{
background:#555;
color:white;
font-size:11px;
padding:3px 6px;
}

/* IMPRESSÃO */

@media print{

body *{
visibility:hidden;
}

#folha,#folha *{
visibility:visible;
}

#folha{
position:absolute;
top:0;
left:0;
box-shadow:none;
}

button{
display:none;
}

}

</style>
</head>

<body>

<header>
<h1>Viva Art</h1>
<span>ARMARINHOS</span>
</header>

<div class="container">

<input id="nome" placeholder="Nome do produto">

<input id="valor" type="number" placeholder="Valor">

<input id="quantidade" type="number" value="1" min="1">

<select id="tamanho">
<option value="tamanho1">Etiqueta pequena</option>
<option value="tamanho2">Etiqueta promocional</option>
</select>

<br>

<button class="btn-add" onclick="adicionarEtiqueta()">Adicionar</button>

<button class="btn-print" onclick="window.print()">Imprimir</button>

</div>

<div id="folha"></div>

<script>

let etiquetaArrastando=null

function adicionarEtiqueta(){

const nome=document.getElementById("nome").value
const valor=document.getElementById("valor").value
const quantidade=parseInt(document.getElementById("quantidade").value)
const tamanho=document.getElementById("tamanho").value

if(!nome || !valor){

alert("Preencha nome e valor")
return

}

for(let i=0;i<quantidade;i++){

criarEtiqueta(nome,valor,tamanho)

}

document.getElementById("nome").value=""
document.getElementById("valor").value=""
document.getElementById("quantidade").value=1

}

function criarEtiqueta(nome,valor,tamanho){

const folha=document.getElementById("folha")

const etiqueta=document.createElement("div")

etiqueta.className=`etiqueta ${tamanho}`

etiqueta.innerHTML=`

<button class="btn-editar" onclick="editarEtiqueta(this)">✏</button>

<span class="nome">${nome}</span>

<span class="valor">R$ ${parseFloat(valor).toFixed(2)}</span>

<button class="btn-duplicar" onclick="duplicarEtiqueta(this)">⧉</button>

<button class="btn-excluir" onclick="excluirEtiqueta(this)">🗑</button>

`

folha.appendChild(etiqueta)

}

/* EXCLUIR */

function excluirEtiqueta(botao){

botao.closest(".etiqueta").remove()

}

/* EDITAR */

function editarEtiqueta(botao){

const etiqueta=botao.closest(".etiqueta")

const nome=etiqueta.querySelector(".nome").innerText

const valor=etiqueta.querySelector(".valor").innerText.replace("R$ ","")

document.getElementById("nome").value=nome

document.getElementById("valor").value=valor

etiqueta.remove()

}

/* DUPLICAR */

function duplicarEtiqueta(botao){

const etiqueta=botao.closest(".etiqueta")

const nome=etiqueta.querySelector(".nome").innerText

const valor=etiqueta.querySelector(".valor").innerText.replace("R$ ","")

const tamanho=etiqueta.classList.contains("tamanho1") ? "tamanho1":"tamanho2"

criarEtiqueta(nome,valor,tamanho)

}

</script>

</body>
</html>
